version: "3"

services:

  mysql:
    image: docker.io/library/mysql:8
    container_name: todo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"

  adminer:
    image: docker.io/adminer
    restart: always
    ports:
      - "8080:8080"